
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="left-half"><rect x="0" y="0" width="256" height="512"/></clipPath>
    <clipPath id="right-half"><rect x="256" y="0" width="256" height="512"/></clipPath>
  </defs>

  <!-- orange orbit -->
  <ellipse cx="255.49" cy="255.50" rx="241.57" ry="94.86"
           transform="rotate(-27.84 255.49 255.50)"
           fill="none" stroke="#FF8856" stroke-width="30"
           clip-path="url(#left-half)"/>
  <ellipse cx="255.49" cy="255.50" rx="241.57" ry="94.86"
           transform="rotate(-27.84 255.49 255.50)"
           fill="none" stroke="#FF641A" stroke-width="30"
           clip-path="url(#right-half)"/>

  <!-- cyan orbit -->
  <ellipse cx="255.46" cy="256.50" rx="236.18" ry="93.04"
           transform="rotate(30.58 255.46 256.50)"
           fill="none" stroke="#00FFE7" stroke-width="30"
           clip-path="url(#left-half)"/>
  <ellipse cx="255.46" cy="256.50" rx="236.18" ry="93.04"
           transform="rotate(30.58 255.46 256.50)"
           fill="none" stroke="#00DDC1" stroke-width="30"
           clip-path="url(#right-half)"/>

  <!-- nucleus -->
  <circle cx="255.57" cy="255.5" r="53.1" fill="#FA184B" clip-path="url(#left-half)"/>
  <circle cx="255.57" cy="255.5" r="53.1" fill="#BD0533" clip-path="url(#right-half)"/>

  <!-- blue orbit -->
  <ellipse cx="255.5" cy="255.5" rx="92.35" ry="240.43"
           fill="none" stroke="#1F5C99" stroke-width="30.2"
           clip-path="url(#left-half)"/>
  <ellipse cx="255.5" cy="255.5" rx="92.35" ry="240.43"
           fill="none" stroke="#0E365C" stroke-width="30.2"
           clip-path="url(#right-half)"/>

  <!-- electrons -->
  <defs>
    <clipPath id="e1-left"><rect x="42" y="84" width="36" height="72"/></clipPath>
    <clipPath id="e1-right"><rect x="78" y="84" width="36" height="72"/></clipPath>
    <clipPath id="e2-left"><rect x="408" y="350" width="36" height="72"/></clipPath>
    <clipPath id="e2-right"><rect x="444" y="350" width="36" height="72"/></clipPath>
  </defs>
  <circle cx="77.76" cy="119.30" r="35.56" fill="#FFD396" clip-path="url(#e1-left)"/>
  <circle cx="77.76" cy="119.30" r="35.56" fill="#FF9F00" clip-path="url(#e1-right)"/>
  <circle cx="442.71" cy="385.30" r="35.56" fill="#FFD396" clip-path="url(#e2-left)"/>
  <circle cx="442.71" cy="385.30" r="35.56" fill="#FF9F00" clip-path="url(#e2-right)"/>
</svg>
